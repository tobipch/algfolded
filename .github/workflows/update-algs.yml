name: Update algorithms from blddb

on:
  schedule:
    - cron: '0 3 * * 1' # Every Monday at 03:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # cubing (used by the commutator fetch) needs Node >= 22.3

      - run: npm ci

      - name: Fetch latest LTCT algorithms
        run: node scripts/fetch_blddb_algs.mjs

      - name: Fetch latest commutator algorithms
        run: node scripts/fetch_blddb_comm_algs.mjs

      - name: Create PR if algorithms changed
        uses: peter-evans/create-pull-request@v6
        with:
          title: 'Update algorithms from blddb'
          commit-message: 'Update algorithms from blddb'
          branch: auto/update-algs
          body: |
            Automated weekly update of algorithms from [blddb](https://github.com/nbwzx/blddb).

            Updates the `algs` (and, for commutators, the derived `buffers`) in
            `ltct_map.json`, `corner_comms.json` and `edge_comms.json`. Scrambles
            are unchanged.
          delete-branch: true
